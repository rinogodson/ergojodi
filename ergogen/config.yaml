units:
  mcu_w: 15
  mcu_h: 20
  mcu_p: 2

  m2_ext: 6/2
  m2_ext_height: 2
  m2_ext_hole: 2.3/2
  m2_recess: 1.5
  m2_recess_radius: 4.5/2
  m2_boss: 3/2
  m2_boss_height: 1.4
  m2_hol: ((m2_boss*2)+0.1)/2

  m2_heat: 3.9/2
  m2_depth: 4

  # trrs_w: 13
  # (3-1.8)+2+1.6+4
  wall_thick_original: 3
  wall_thick: wall_thick_original*2
  pcb_thick: 1.6
  p: u+3
  p_in: p+1
  p_outer: p_in+wall_thick
  top_thick: 1.4
  x_height: wall_thick_original+m2_ext_height+pcb_thick+5-top_thick # 3+3+1.6+5-1.4
  k: 14
  k_t: k+0.075

points:
  zones:
    matrix:
      rows:
        bottom:
          # ROW3
          row_net: l_A2
          mirror.row_net: r_A8
        home:
          # ROW2
          row_net: l_A1
          mirror.row_net: r_A9
        top:
          # ROW1
          row_net: l_A0
          mirror.row_net: r_A10
      columns:
        pinky:
          # COL1
          key:
            column_net: l_A10
            mirror.column_net: r_A0
        ring:
          # COL2
          key:
            column_net: l_A9
            mirror.column_net: r_A1
            origin: [-12, -u]
            stagger: 10
            splay: -4
        middle:
          # COL3
          key:
            column_net: l_A8
            mirror.column_net: r_A2
            stagger: 5
        index:
          # COL4
          key:
            column_net: l_A7
            mirror.column_net: r_A3
            stagger: -5
        inner:
          # COL5
          key:
            column_net: l_A4
            mirror.column_net: r_A4
            stagger: -2
      anchor:
        shift: [100, -150]
        rotate: 4
    thumbfan:
      anchor:
        ref: matrix_index_bottom
        shift: [0, -25]
        rotate: -15
      columns:
        near:
          #COL3
          key:
            column_net: l_A8
            mirror.column_net: r_A2
        home:
          #COL4
          key:
            column_net: l_A7
            mirror.column_net: r_A3
            spread: U
            splay: -15
            origin: [-10, -9]
        far:
          #COL5
          key:
            column_net: l_A4
            mirror.column_net: r_A4
            spread: U
            splay: -15
            origin: [-10, -9]
      rows:
        thumb:
          #ROW4
          row_net: l_A3
          mirror.row_net: r_A7
  rotate: 0
  mirror: &mirror
    ref: thumbfan_far_thumb
    distance: 45
outlines:
  usb_cutout:
    - what: rectangle
      size: [9.5, 4]
      operation: add
      where:
        ref: matrix_inner_home
        shift: [20, -3.4mcu_p]
        rotate: 90
    - what: rectangle
      size: [9.5, 4]
      operation: add
      where:
        ref: mirror_matrix_inner_home
        shift: [20, -3.4mcu_p]
        rotate: 90
  keys:
    - what: rectangle
      where: true
      size: [k, k]
  keys_cutout:
    - what: rectangle
      where: true
      size: [k_t, k_t]
  m2_silk:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
      # right
    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
  m2_top_hole:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_heat
      operation: add
      # right
    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_heat
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
