      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: mirror_thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
  caseinner:
    - what: polygon
      fillet: 2
      operation: add
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p_in, -0.5p_in]
        - ref: matrix_pinky_bottom
          shift: [2p_in+mcu_p-5, -0.5p_in]
        - ref: matrix_pinky_bottom
          shift: [-0.5p_in, -0.5p_in]
        - ref: matrix_pinky_top
          shift: [-0.5p_in, 0.5p_in]
        - ref: matrix_pinky_top
          shift: [0.5p_in, 0.5p_in]
        - ref: matrix_ring_top
          shift: [-0.5p_in, 0.5p_in]
        - ref: matrix_ring_top
          shift: [0.5p_in, 0.5p_in]
        - ref: matrix_inner_top
          shift: [15, 0.5p_in+2+((p_in - p)/2)]
        - ref: matrix_inner_top
          shift: [0.5p_in+mcu_p+mcu_p+mcu_w, 0.5p_in+2+((p_in - p)/2)]
        - ref: matrix_inner_top
          shift: [0.5p_in+mcu_p+mcu_p+mcu_w, 0.5p_in-mcu_h-mcu_p+2-(p_in-p)]
        - ref: matrix_inner_top
          shift:
            [0.5p_in+mcu_w+mcu_p+mcu_p-10.8, 0.5p_in-mcu_h-mcu_p+2-7-(p_in-p)]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_in+mcu_w+mcu_p+mcu_p-10.8,
              0.5p_in-mcu_h-mcu_p-mcu_p-18- (p_in-p),
            ]
        - ref: matrix_inner_top
          shift: [0, 0.5p_in-mcu_h-mcu_p-mcu_p-18-8-(p_in-p)]
        - ref: thumbfan_far_thumb
          shift: [-1p_in, 0.5p_in]
        - ref: thumbfan_far_thumb
          shift: [0.5p_in, 0.5p_in]
        - ref: thumbfan_far_thumb
          shift: [0.5p_in, -0.5p_in]
        - ref: thumbfan_far_thumb
          shift: [-0.5p_in, -0.5p_in]
        - ref: thumbfan_home_thumb
          shift: [-0.5p_in, -0.5p_in]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p_in, 2.5p_in]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p_in, p_in]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      fillet: 2
      operation: add
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p_in, -0.5p_in]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p_in+mcu_p-5, -0.5p_in]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p_in, -0.5p_in]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p_in, 0.5p_in]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p_in, 0.5p_in]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p_in, 0.5p_in]
        - ref: mirror_matrix_ring_top
          shift: [0.5p_in, 0.5p_in]
        - ref: mirror_matrix_inner_top
          shift: [15, 0.5p_in+2+((p_in - p)/2)]
        - ref: mirror_matrix_inner_top
          shift: [0.5p_in+mcu_p+mcu_p+mcu_w, 0.5p_in+2+((p_in - p)/2)]
        - ref: mirror_matrix_inner_top
          shift: [0.5p_in+mcu_p+mcu_p+mcu_w, 0.5p_in-mcu_h-mcu_p+2-(p_in-p)]
        - ref: mirror_matrix_inner_top
          shift:
            [0.5p_in+mcu_w+mcu_p+mcu_p-10.8, 0.5p_in-mcu_h-mcu_p+2-7-(p_in-p)]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_in+mcu_w+mcu_p+mcu_p-10.8,
              0.5p_in-mcu_h-mcu_p-mcu_p-18- (p_in-p),
            ]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p_in-mcu_h-mcu_p-mcu_p-18-8-(p_in-p)]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p_in, 0.5p_in]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_in, 0.5p_in]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_in, -0.5p_in]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p_in, -0.5p_in]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p_in, -0.5p_in]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p_in, 2.5p_in]
      fillet: 5
      operation: add
    - what: rectangle
      where: mirror_matrix_middle_top
      size: [p_in, p_in]
      fillet: 2
      operation: add
  caseouter:
    - what: polygon
      fillet: 4
      operation: add
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: matrix_pinky_bottom
          shift: [2p_outer+mcu_p-(wall_thick*4.3), -0.5p_outer]
        - ref: matrix_pinky_bottom
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: matrix_pinky_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: matrix_pinky_top
          shift: [0.5p_outer-wall_thick, 0.5p_outer]
        - ref: matrix_ring_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: matrix_ring_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: matrix_inner_top
          shift: [6, 0.5p_outer+0.3]
        - ref: matrix_inner_top
          shift: [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer+0.3]
        - ref: matrix_inner_top
          shift:
            [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer-mcu_h-mcu_p+2-(p_outer-p)]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-12.5,
              0.5p_outer-mcu_h-mcu_p+2-4-(p_outer-p),
            ]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-12.5,
              0.5p_outer-mcu_h-mcu_p-mcu_p-18- (p_outer-p),
            ]
        - ref: matrix_inner_top
          shift: [0, 0.5p_outer-mcu_h-mcu_p-mcu_p-18-8-(p_outer-p)]
        - ref: thumbfan_far_thumb
          shift: [-1p_outer, 0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [0.5p_outer, 0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [0.5p_outer, -0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
        - ref: thumbfan_home_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p_outer, 2.5p_outer]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p_outer, p_outer]
      fillet: 2
      operation: add

    # mirror
    - what: polygon
      operation: add
      fillet: 4
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p_outer+mcu_p-(wall_thick*4.3), -0.5p_outer]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p_outer-wall_thick, 0.5p_outer]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_ring_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_inner_top
          shift: [6, 0.5p_outer+0.3]
        - ref: mirror_matrix_inner_top
          shift: [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer+0.3]
        - ref: mirror_matrix_inner_top
          shift:
            [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer-mcu_h-mcu_p+2-(p_outer-p)]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-12.5,
              0.5p_outer-mcu_h-mcu_p+2-4-(p_outer-p),
            ]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-12.5,
              0.5p_outer-mcu_h-mcu_p-mcu_p-18- (p_outer-p),
            ]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p_outer-mcu_h-mcu_p-mcu_p-18-8-(p_outer-p)]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p_outer, 0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_outer, 0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_outer, -0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p_outer, 2.5p_outer]
      fillet: 5
      operation: add
    - what: rectangle
      fillet: 2
      where: mirror_matrix_middle_top
      size: [p_outer, p_outer]
      operation: add
  out:
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: mirror_matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
  plate:
    - what: outline
      name: out
      operation: add
    - what: outline
      name: keys
      operation: subtract
  pcb_plate:
    - what: outline
      name: out
      operation: add
    #demo
    # - what: outline
    #   name: caseouter
    #   operation: add
    # - what: outline
    #   name: caseinner
    #   operation: subtract
    - what: outline
      name: m2_hole
      operation: subtract
  mcu_cutout:
    - what: rectangle
      size: [10, 9]
      where:
        ref: matrix_inner_top
        shift: [mcu_p+mcu_w+mcu_p+0.5, mcu_p+1.3]
        rotate: 0
      operation: add
    - what: rectangle
      size: [10, 9]
      where:
        ref: mirror_matrix_inner_top
        shift: [mcu_p+mcu_w+mcu_p+0.5, mcu_p+1.3]
        rotate: 0
      operation: add
  demo:
    - what: rectangle
      where: true
      size: [u-1, u-1]
    - what: rectangle
      where: true
      size: [14, 14]
      operation: stack
    - what: rectangle
      operation: stack
      size: [18, 21]
      where:
        ref: matrix_inner_top
        shift: [mcu_p+mcu_w+mcu_p, mcu_p+0.5]
        rotate: 0
    - what: rectangle
      operation: stack
      size: [10.6, 7.7]
      where:
        ref: matrix_inner_home
        shift: [17, -2.2mcu_p]
        rotate: 90
    - what: outline
      name: m2_silk
      operation: stack
    - what: outline
      name: m2_hole
      operation: stack
    # - what: outline
    #   name: pcb_plate
    #   operation: stack
    - what: outline
      name: caseinner
      operation: stack
    - what: outline
      name: caseouter
      operation: stack
pcbs:
  ergojodi:
    outlines:
      main:
        outline: pcb_plate
        layer: Edge.Cuts
      silkF:
        outline: m2_silk
        layer: F.SilkS
      silkB:
        outline: m2_silk
        layer: B.SilkS
    footprints:
      mx_hotswap:
        what: mx_new
        where: true
        params:
          keycaps: true
          reverse: false
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -5]
      xiao_left:
        what: xiao
        params:
          side: F
          A0: l_A0
          A1: l_A1
          A10: l_A10
          A2: l_A2
          A3: l_A3
          A4: l_A4
          A5: l_A5
          A6: l_Dplus #l_A6
          A7: l_A7
          A8: l_A8
          A9: l_A9
          GND: l_GND
          P_3V3: l_P_3V3
          VCC: l_VCC
        where:
          ref: matrix_inner_top
          shift: [mcu_p+mcu_w+mcu_p+0.5, mcu_p+1.3]
          rotate: 0
      # trrs_left:
      #   params:
      #     side: B
      #     TP: "l_TP"
      #     R1: "l_R1"
      #     R2: "l_R2"
      #     SL: "l_SL"
      #   what: trrs_pj320a
      #   where:
      #     ref: matrix_inner_home
      #     shift: [trrs_w+9, -1.8mcu_p]
      #     rotate: -90
      # trrs_right:
      #   params:
      #     side: B
      #     TP: "r_TP"
      #     R1: "r_R1"
      #     R2: "r_R2"
      #     SL: "r_SL"
      #   what: trrs_pj320a
      #   where:
      #     ref: mirror_matrix_inner_home
      #     shift: [trrs_w+9, -1.8mcu_p]
      #     rotate: -90
      usbc_left:
        what: usbc
        params:
          side: F
          A1: l_GND
          A12: l_GND
          A4: l_VCC
          A5: l_A5u
          A6: l_Dplus
          A7: l_Dminus
          A8: l_A8u
          A9: l_VCC
          B1: l_GND
          B12: l_GND
          B4: l_VCC
          B5: l_B5u
          B6: l_Dplus
          B7: l_Dminus
          B8: l_B8u
          B9: l_VCC
          NP: l_GND
        where:
          ref: matrix_inner_home
          shift: [17.4, -3.4mcu_p]
          rotate: 90
      usbc_right:
        what: usbc
        params:
          side: F
          A1: r_GND
          A12: r_GND
          A4: r_VCC
          A5: r_A5u
          A6: r_Dplus
          A7: r_Dminus
          A8: r_A8u
          A9: r_VCC
          B1: r_GND
          B12: r_GND
          B4: r_VCC
          B5: r_B5u
          B6: r_Dplus
          B7: r_Dminus
          B8: r_B8u
          B9: r_VCC
          NP: r_GND
        where:
          ref: mirror_matrix_inner_home
          shift: [17.4, -3.4mcu_p]
          rotate: 90
      xiao_right:
        what: xiao
        params:
          side: F
          A0: r_A0
          A1: r_A1
          A10: r_A10
          A2: r_A2
          A3: r_A3
          A4: r_A4
          A5: r_A5
          A6: r_Dplus #r_A6
          A7: r_A7
          A8: r_A8
          A9: r_A9
          GND: r_GND
          P_3V3: r_P_3V3
          VCC: r_VCC
        where:
          ref: mirror_matrix_inner_top
          shift: [mcu_p+mcu_w+mcu_p+0.5, mcu_p+1.3]
          rotate: 0
cases:
  _xlBottom:
    - name: caseouter
      extrude: wall_thick_original
  # _pcb:
  #   - name: pcb_plate
  #     extrude: pcb_thick
  #     shift: [0, 0, 5]
  _outerWall:
    - name: caseouter
      extrude: x_height
  _innerWall:
    - name: caseinner
      extrude: x_height
  _mcu_hole:
    - name: mcu_cutout
      extrude: top_thick + 4
  _wall:
    - what: case
      name: _outerWall
      operation: add
    - what: case
      name: _innerWall
      operation: subtract
  _standoff:
    - name: m2_ext
      extrude: m2_ext_height+0.5
      shift: [0, 0, wall_thick_original-0.5]
  _boss:
    - name: m2_boss
      extrude: m2_boss_height+0.5
      shift: [0, 0, wall_thick_original+m2_ext_height-0.5]
  _bottom_hole:
    - name: m2_ext_hole
      extrude: wall_thick_original+m2_ext_height+m2_boss_height+1
      shift: [0, 0, -0.5]
  _m2_recess:
    - name: m2_recess
      extrude: m2_recess
      shift: [0, 0, 0]

  _usb_hole:
    - name: usb_cutout
      extrude: wall_thick+2
      shift: [0, 0, wall_thick_original+m2_ext_height+pcb_thick-0.3]

  _caseoriginal:
    - what: case
      name: _wall
      operation: add
    - what: case
      name: _xlBottom
      operation: add
    - what: case
      name: _standoff
      operation: add
    - what: case
      name: _boss
      operation: add
    - what: case
      name: _bottom_hole
      operation: subtract
    - what: case
      name: _m2_recess
      operation: subtract
    - what: case
      name: _usb_hole
      operation: subtract
    - what: case
      name: _mcu_hole
      operation: subtract
      shift: [0, 7.5, pcb_thick+5-top_thick-3+m2_ext_height+pcb_thick+1.7]
    # - what: case
    #   name: _pcb
    #   operation: add

  caseoriginal:
    - what: case
      name: _caseoriginal
      operation: add
      shift: [0, 0, -wall_thick_original-m2_ext_height]

  _top_plate:
    - name: caseouter
      extrude: top_thick
    - name: keys_cutout
      operation: subtract
      extrude: top_thick+0.1

  _top_standoff:
    - name: m2_ext
      extrude: 5

  top_plate:
    - what: case
      name: _top_plate
      operation: add
      shift: [0, 0, pcb_thick+5-top_thick]
    - what: case
      name: _mcu_hole
      operation: subtract
      shift: [0, 7.5, pcb_thick+5-top_thick-3]
    - what: case
      name: _top_standoff
      operation: add
      shift: [0, 0, top_thick+0.1]
    - name: m2_top_hole
      extrude: m2_depth
      operation: subtract
      shift: [0, 0, top_thick+0.1]
