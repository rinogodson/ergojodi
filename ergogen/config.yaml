      operation: add
  m2_recess:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
