units:
  mcu_w: 15
  mcu_h: 20
  mcu_p: 2

  m2_ext: 3
  m2_hol: 2.1

  # trrs_w: 13

  p: u+3
  p_inner: u+3+1
  p_outer: p_inner+3

points:
  zones:
    matrix:
      rows:
        bottom:
          # ROW3
          row_net: l_A2
          mirror.row_net: r_A8
        home:
          # ROW2
          row_net: l_A1
          mirror.row_net: r_A9
        top:
          # ROW1
          row_net: l_A0
          mirror.row_net: r_A10
      columns:
        pinky:
          # COL1
          key:
            column_net: l_A10
            mirror.column_net: r_A0
        ring:
          # COL2
          key:
            column_net: l_A9
            mirror.column_net: r_A1
            origin: [-12, -u]
            stagger: 10
            splay: -4
        middle:
          # COL3
          key:
            column_net: l_A8
            mirror.column_net: r_A2
            stagger: 5
        index:
          # COL4
          key:
            column_net: l_A7
            mirror.column_net: r_A3
            stagger: -5
        inner:
          # COL5
          key:
            column_net: l_A4
            mirror.column_net: r_A4
            stagger: -2
      anchor:
        shift: [100, -150]
        rotate: 4
    thumbfan:
      anchor:
        ref: matrix_index_bottom
        shift: [0, -25]
        rotate: -15
      columns:
        near:
          #COL3
          key:
            column_net: l_A8
            mirror.column_net: r_A2
        home:
          #COL4
          key:
            column_net: l_A7
            mirror.column_net: r_A3
            spread: U
            splay: -15
            origin: [-10, -9]
        far:
          #COL5
          key:
            column_net: l_A4
            mirror.column_net: r_A4
            spread: U
            splay: -15
            origin: [-10, -9]
      rows:
        thumb:
          #ROW4
          row_net: l_A3
          mirror.row_net: r_A7
  rotate: 0
  mirror: &mirror
    ref: thumbfan_far_thumb
    distance: 45
outlines:
  keys:
    - what: rectangle
      where: true
      size: [14, 14]
  m2_silk:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
      # right
    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
  m2_hole:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
      # right

    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
  caseinner:
    - what: polygon
      fillet: 2
      operation: add
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: matrix_pinky_bottom
          shift: [2p_inner+mcu_p-5, -0.5p_inner]
        - ref: matrix_pinky_bottom
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: matrix_pinky_top
          shift: [-0.5p_inner, 0.5p_inner]
        - ref: matrix_pinky_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: matrix_ring_top
          shift: [-0.5p_inner, 0.5p_inner]
        - ref: matrix_ring_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: matrix_index_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: matrix_inner_top
          shift: [-0.5p_inner+3, 0.5p_inner+2]
        - ref: matrix_inner_top
          shift: [0.5p_inner+mcu_p+mcu_p+mcu_w, 0.5p_inner+2]
        - ref: matrix_inner_top
          shift:
            [0.5p_inner+mcu_p+mcu_p+mcu_w, 0.5p_inner-mcu_h-mcu_p+2-(p_inner-p)]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_inner+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_inner-mcu_h-mcu_p+2-7-(p_inner-p),
            ]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_inner+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_inner-mcu_h-mcu_p-mcu_p-18- (p_inner-p),
            ]
        - ref: matrix_inner_top
          shift: [0, 0.5p_inner-mcu_h-mcu_p-mcu_p-18-8-(p_inner-p)]
        - ref: thumbfan_far_thumb
          shift: [-1p_inner, 0.5p_inner]
        - ref: thumbfan_far_thumb
          shift: [0.5p_inner, 0.5p_inner]
        - ref: thumbfan_far_thumb
          shift: [0.5p_inner, -0.5p_inner]
        - ref: thumbfan_far_thumb
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: thumbfan_home_thumb
          shift: [-0.5p_inner, -0.5p_inner]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p_inner, 2.5p_inner]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p_inner, p_inner]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p_inner+mcu_p-5, -0.5p_inner]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p_inner, 0.5p_inner]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p_inner, 0.5p_inner]
        - ref: mirror_matrix_ring_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: mirror_matrix_index_top
          shift: [0.5p_inner, 0.5p_inner]
        - ref: mirror_matrix_inner_top
          shift: [-0.5p_inner+3, 0.5p_inner+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p_inner+mcu_p+mcu_p+mcu_w, 0.5p_inner+2]
        - ref: mirror_matrix_inner_top
          shift:
            [0.5p_inner+mcu_p+mcu_p+mcu_w, 0.5p_inner-mcu_h-mcu_p+2-(p_inner-p)]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_inner+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_inner-mcu_h-mcu_p+2-7-(p_inner-p),
            ]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_inner+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_inner-mcu_h-mcu_p-mcu_p-18- (p_inner-p),
            ]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p_inner-mcu_h-mcu_p-mcu_p-18-8-(p_inner-p)]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p_inner, 0.5p_inner]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_inner, 0.5p_inner]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_inner, -0.5p_inner]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p_inner, -0.5p_inner]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p_inner, -0.5p_inner]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p_inner, 2.5p_inner]
      fillet: 5
      operation: add
    - what: rectangle
      fillet: 2
      where: mirror_matrix_middle_top
      size: [p_inner, p_inner]
      operation: add
  caseouter:
    - what: polygon
      fillet: 2
      operation: add
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: matrix_pinky_bottom
          shift: [2p_outer+mcu_p-13, -0.5p_outer]
        - ref: matrix_pinky_bottom
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: matrix_pinky_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: matrix_pinky_top
          shift: [0.5p_outer-2, 0.5p_outer]
        - ref: matrix_ring_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: matrix_ring_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: matrix_index_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: matrix_inner_top
          shift: [-0.5p_outer+3, 0.5p_outer+2]
        - ref: matrix_inner_top
          shift: [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer+2]
        - ref: matrix_inner_top
          shift:
            [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer-mcu_h-mcu_p+2-(p_outer-p)]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_outer-mcu_h-mcu_p+2-7-(p_outer-p),
            ]
        - ref: matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_outer-mcu_h-mcu_p-mcu_p-18- (p_outer-p),
            ]
        - ref: matrix_inner_top
          shift: [0, 0.5p_outer-mcu_h-mcu_p-mcu_p-18-8-(p_outer-p)]
        - ref: thumbfan_far_thumb
          shift: [-1p_outer, 0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [0.5p_outer, 0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [0.5p_outer, -0.5p_outer]
        - ref: thumbfan_far_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
        - ref: thumbfan_home_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p_outer, 2.5p_outer]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p_outer, p_outer]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p_outer+mcu_p-13, -0.5p_outer]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p_outer, -0.5p_outer]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p_outer-2, 0.5p_outer]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_ring_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_index_top
          shift: [0.5p_outer, 0.5p_outer]
        - ref: mirror_matrix_inner_top
          shift: [-0.5p_outer+3, 0.5p_outer+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer+2]
        - ref: mirror_matrix_inner_top
          shift:
            [0.5p_outer+mcu_p+mcu_p+mcu_w, 0.5p_outer-mcu_h-mcu_p+2-(p_outer-p)]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_outer-mcu_h-mcu_p+2-7-(p_outer-p),
            ]
        - ref: mirror_matrix_inner_top
          shift:
            [
              0.5p_outer+mcu_w+mcu_p+mcu_p-10.5,
              0.5p_outer-mcu_h-mcu_p-mcu_p-18- (p_outer-p),
            ]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p_outer-mcu_h-mcu_p-mcu_p-18-8-(p_outer-p)]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p_outer, 0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_outer, 0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p_outer, -0.5p_outer]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p_outer, -0.5p_outer-0.5]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p_outer, 2.5p_outer]
      fillet: 5
      operation: add
    - what: rectangle
      fillet: 2
      where: mirror_matrix_middle_top
      size: [p_outer, p_outer]
      operation: add
  out:
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: matrix_index_top
          shift: [0.5p, 0.5p]
        - ref: matrix_inner_top
          shift: [-0.5p+3, 0.5p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: mirror_matrix_index_top
          shift: [0.5p, 0.5p]
        - ref: mirror_matrix_inner_top
          shift: [-0.5p+3, 0.5p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: mirror_matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
  plate:
    - what: outline
      name: out
      operation: add
    - what: outline
      name: keys
      operation: subtract
  pcb_plate:
    - what: outline
      name: out
      operation: add
    #demo
    # - what: outline
    #   name: caseouter
    #   operation: add
    # - what: outline
    #   name: caseinner
    #   operation: subtract
    - what: outline
      name: m2_hole
      operation: subtract
  demo:
    - what: rectangle
      where: true
      size: [u-1, u-1]
    - what: rectangle
      where: true
      size: [14, 14]
      operation: stack
    - what: rectangle
      operation: stack
      size: [18, 21]
      where:
        ref: matrix_inner_top
        shift: [mcu_p+mcu_w+mcu_p, mcu_p+0.5]
        rotate: 0
    - what: rectangle
      operation: stack
      size: [10.6, 7.7]
      where:
        ref: matrix_inner_home
        shift: [17, -2.2mcu_p]
        rotate: 90
    - what: outline
      name: m2_silk
      operation: stack
    - what: outline
      name: m2_hole
      operation: stack
    # - what: outline
    #   name: pcb_plate
    #   operation: stack
    - what: outline
      name: caseinner
      operation: stack
    - what: outline
      name: caseouter
      operation: stack
pcbs:
  ergojodi:
    outlines:
      main:
        outline: pcb_plate
        layer: Edge.Cuts
      silkF:
        outline: m2_silk
        layer: F.SilkS
