units:
  mcu_w: 15
  mcu_h: 20
  mcu_p: 2

  # trrs_w: 13

  p: u+3

points:
  zones:
    matrix:
      rows:
        bottom:
        home:
        top:
      columns:
        pinky:
          key:
        ring:
          key:
            origin: [-12, -u]
            stagger: 10
            splay: -4
        middle:
          key:
            stagger: 5
        index:
          key:
            stagger: -5
        inner:
          key:
            stagger: -2
      anchor:
        shift: [100, -150]
        rotate: 4
    thumbfan:
      anchor:
        ref: matrix_index_bottom
        shift: [0, -25]
        rotate: -15
      columns:
        near:
        home:
          key:
            spread: U
            splay: -15
            origin: [-10, -9]
        far:
          key:
            spread: U
            splay: -15
            origin: [-10, -9]
      rows:
        thumb:
  rotate: 0
  mirror: &mirror
    ref: thumbfan_far_thumb
    distance: 34
outlines:
  keys:
    - what: rectangle
      where: true
      size: [14, 14]
  demo:
    - what: rectangle
      where: true
      size: [u-1, u-1]
    - what: rectangle
      where: true
      size: [13.5, 13.5]
      operation: stack
  out:
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: matrix_index_top
          shift: [0.5p, 0.5p]
        - ref: matrix_inner_top
          shift: [-0.5p+3, 0.5p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
    # mirror
    - what: polygon
      operation: add
      fillet: 2
      points:
        - ref: mirror_thumbfan_near_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [2p+mcu_p-2.5, -0.5p]
        - ref: mirror_matrix_pinky_bottom
          shift: [-0.5p, -0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_pinky_top
          shift: [0.5p+1, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [-0.5p, 0.5p]
        - ref: mirror_matrix_ring_top
          shift: [0.5p, 0.5p]
        - ref: mirror_matrix_index_top
          shift: [0.5p, 0.5p]
        - ref: mirror_matrix_inner_top
          shift: [-0.5p+3, 0.5p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_p+mcu_p+mcu_w, 0.5p-mcu_h-mcu_p+2]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p+2-7]
        - ref: mirror_matrix_inner_top
          shift: [0.5p+mcu_w+mcu_p+mcu_p-10.5, 0.5p-mcu_h-mcu_p-mcu_p-18]
        - ref: mirror_matrix_inner_top
          shift: [0, 0.5p-mcu_h-mcu_p-mcu_p-18-8]
        - ref: mirror_thumbfan_far_thumb
          shift: [-1p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, 0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [0.5p, -0.5p]
        - ref: mirror_thumbfan_far_thumb
          shift: [-0.5p, -0.5p]
        - ref: mirror_thumbfan_home_thumb
          shift: [-0.5p, -0.5p]
    - what: rectangle
      where: mirror_matrix_inner_bottom
      size: [p, 2.5p]
      fillet: 5
      operation: add
    - what: rectangle
      where: mirror_matrix_middle_top
      size: [p, p]
      fillet: 2
      operation: add
      # check key placing
    # - what: outline
    #   name: demo
    #   operation: stack
  plate:
    - what: outline
      name: out
      operation: add
    - what: outline
      name: keys
      operation: subtract
  pcb_plate:
    - what: outline
      name: out
      operation: add
pcbs:
  ergojodi:
    outlines:
      main:
        outline: pcb_plate
    footprints:
      mx_hotswap:
        what: mx_new
        where: true
        params:
          keycaps: true
          reverse: false
          hotswap: true
          from: "{{column_net}}"
          to: "{{colrow}}"
      diode:
        what: diode
        where: true
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
        adjust:
          shift: [0, -5]
      xiao_left:
        what: xiao
        params:
          side: F
          A0: l_A0
          A1: l_A1
          A10: l_A10
          A2: l_A2
          A3: l_A3
          A4: l_A4
          A5: l_A5
          A6: l_A6
          A7: l_A7
          A8: l_A8
          A9: l_A9
          GND: l_GND
          P_3V3: l_P_3V3
          VCC: l_VCC
        where:
          ref: matrix_inner_top
          shift: [mcu_p+mcu_w+mcu_p, mcu_p+0.5]
          rotate: 0
      # trrs_left:
      #   params:
      #     side: B
      #     TP: "l_TP"
      #     R1: "l_R1"
      #     R2: "l_R2"
      #     SL: "l_SL"
      #   what: trrs_pj320a
      #   where:
      #     ref: matrix_inner_home
      #     shift: [trrs_w+9, -1.8mcu_p]
      #     rotate: -90
      # trrs_right:
      #   params:
      #     side: B
      #     TP: "r_TP"
      #     R1: "r_R1"
      #     R2: "r_R2"
      #     SL: "r_SL"
      #   what: trrs_pj320a
      #   where:
      #     ref: mirror_matrix_inner_home
      #     shift: [trrs_w+9, -1.8mcu_p]
      #     rotate: -90
      usbc_left:
        what: usbc
        params:
          side: F
          A1: l_A1u
          A12: l_A12u
          A4: l_A4u
          A5: l_A5u
          A6: l_A6u
          A7: l_A7u
          A8: l_A8u
          A9: l_A9u
          B1: l_B1u
          B12: l_B12u
          B4: l_B4u
          B5: l_B5u
          B6: l_B6u
          B7: l_B7u
          B8: l_B8u
          B9: l_B9u
          NP: l_NPu
        where:
          ref: matrix_inner_home
          shift: [17, -2.2mcu_p]
          rotate: 90
      usbc_right:
        what: usbc
        params:
          side: F
          A1: r_A1u
          A12: r_A12u
          A4: r_A4u
          A5: r_A5u
          A6: r_A6u
          A7: r_A7u
          A8: r_A8u
          A9: r_A9u
          B1: r_B1u
          B12: r_B12u
          B4: r_B4u
          B5: r_B5u
          B6: r_B6u
          B7: r_B7u
          B8: r_B8u
          B9: r_B9u
          NP: r_NPu
        where:
          ref: mirror_matrix_inner_home
          shift: [17, -2.2mcu_p]
          rotate: 90
      xiao_right:
        what: xiao
        params:
          side: F
          A0: r_A0
          A1: r_A1
          A10: r_A10
          A2: r_A2
          A3: r_A3
          A4: r_A4
          A5: r_A5
          A6: r_A6
          A7: r_A7
          A8: r_A8
          A9: r_A9
          GND: r_GND
          P_3V3: r_P_3V3
          VCC: r_VCC
        where:
          ref: mirror_matrix_inner_top
          shift: [mcu_p+mcu_w+mcu_p, mcu_p+0.5]
          rotate: 0
