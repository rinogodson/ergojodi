      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_recess_radius
      operation: add
    - what: circle
      where:
        ref: mirror_thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_recess_radius
      operation: add
  m2_ext:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
      # right
    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_ext
      operation: add
    - what: circle
      where:
        ref: mirror_thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_ext
      operation: add
  m2_boss:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_boss
      operation: add
      # right
    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_boss
      operation: add
    - what: circle
      where:
        ref: mirror_thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_boss
      operation: add
  m2_hole:
    - what: circle
      where:
        ref: matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_inner_bottom
        shift: [0.5p-4.5, -0.5p-1]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: matrix_inner_home
        shift: [0.5p+6, 0.5p-5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: thumbfan_far_thumb
        shift: [-0.5p-0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
      # right

    - what: circle
      where:
        ref: mirror_matrix_pinky_top
        shift: [0.5p+0.5, 0.5p-4.5]
        rotate: 0
      radius: m2_hol
      operation: add
    - what: circle
      where:
        ref: mirror_matrix_pinky_bottom
        shift: [0.5p+0.5, -0.5p+4.5]
        rotate: 0
