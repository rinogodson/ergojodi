points:
  zones:
    matrix:
      rows:
        bottom:
        home:
        top:
      anchor:
        rotate: 8
      columns:
        pinky:
        ring:
          key.origin: [-12, -u]
          key.stagger: 10
        middle:
          key.stagger: 5
        index:
          key.stagger: -5
        inner:
          key.stagger: -2
    thumbfan:
      anchor:
        ref: matrix_index_bottom
        shift: [0, -25]
        rotate: -10
      columns:
        near:
        home:
          key.spread: u
          key.splay: -15
          key.origin: [-10, -9]
        far:
          key.spread: u
          key.splay: -15
          key.origin: [-30, -9]
      rows:
        thumb:
  rotate: 0
  mirror:
    ref: matrix_pinky_bottom
    distance: 250
outlines:
  raw:
    - what: rectangle
      where: true
      size: [20, 20]
  board:
    - what: outline
      name: raw
      fillet: 3
  keys:
    - what: rectangle
      where: true
      size: [14, 14]
  demo:
    - what: rectangle
      where: true
      size: [u-1, u-1]
